<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Beer Brewing — Temperature Log</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body v-scope>
  <main class="card">
    <h1>Beer Brewing — Temperature Log</h1>

    <section class="beer-meta">
      <label class="field">
        <span class="field-label">Beer name</span>
        <input type="text" v-model="name" @change="persistMeta()" placeholder="e.g. Amber Ale #1" />
      </label>

      <label class="field">
        <span class="field-label">Batch number</span>
        <input type="text" v-model="batch" @change="persistMeta()" placeholder="e.g. B-2026-03" />
      </label>

      <label class="field">
        <span class="field-label">Recipe</span>
        <textarea v-model="recipe" @change="persistMeta()" rows="4" placeholder="Malts, hops, yeast, quantities…"></textarea>
      </label>

      <label class="field">
        <span class="field-label">Brewing note</span>
        <textarea v-model="note" @change="persistMeta()" rows="3" placeholder="Anything worth remembering about this batch…"></textarea>
      </label>
    </section>

    <section class="temp-control">
      <div class="button-row">
        <button @click="adjust(-2)">-2.0</button>
        <button @click="adjust(-0.5)">-0.5</button>
        <button @click="adjust(-0.1)">-0.1</button>
      </div>

      <div class="temp-display">
        <input type="number" step="0.1" v-model.number="currentTemp" />
        <span class="unit">°C</span>
      </div>

      <div class="button-row">
        <button @click="adjust(0.1)">+0.1</button>
        <button @click="adjust(0.5)">+0.5</button>
        <button @click="adjust(2)">+2.0</button>
      </div>

      <button class="add-btn" @click="addMeasurement()">Add Measurement</button>
    </section>

    <section class="entries">
      <h2>Log</h2>
      <p v-if="entries.length === 0" class="empty">No measurements yet.</p>
      <ul v-else>
        <li v-for="entry in entries" :key="entry.id">
          <span class="entry-time">{{ formatTime(entry.time) }}</span>
          <span class="entry-temp">{{ entry.temp.toFixed(1) }}°C</span>
          <button class="remove-btn" @click="removeEntry(entry.id)">Remove</button>
        </li>
      </ul>
    </section>

    <section class="export">
      <button class="export-btn" @click="exportBeer()">Export as JSON</button>
    </section>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
